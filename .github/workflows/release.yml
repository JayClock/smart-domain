name: Smart Domain Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.0
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  CI: true
  TZ: UTC
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Drop failed Central staging repositories
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
        shell: bash
        run: |
          AUTH=$(printf '%s:%s' "${CENTRAL_TOKEN_USERNAME}" "${CENTRAL_TOKEN_PASSWORD}" | base64 | tr -d '\n')
          RESPONSE=$(curl --fail --silent --show-error \
            --header "Authorization: Bearer ${AUTH}" \
            "https://ossrh-staging-api.central.sonatype.com/manual/search/repositories?ip=any")
          if [ -z "${RESPONSE}" ]; then
            echo "No failed or open Central repositories to drop."
            exit 0
          fi
          REPOSITORIES=$(RESPONSE="${RESPONSE}" python3 -c '
import json
import os

data = json.loads(os.environ["RESPONSE"])
repos = data.get("repositories", data if isinstance(data, list) else [])
for repo in repos:
    key = repo.get("key")
    state = str(repo.get("state", "")).lower()
    if key and state != "released":
        print(key)
')

          if [ -z "${REPOSITORIES}" ]; then
            echo "No failed or open Central repositories to drop."
            exit 0
          fi

          while IFS= read -r repository; do
            [ -z "${repository}" ] && continue
            echo "Dropping stale Central repository ${repository}"
            curl --fail --silent --show-error \
              --request DELETE \
              --header "Authorization: Bearer ${AUTH}" \
              "https://ossrh-staging-api.central.sonatype.com/manual/drop/repository/${repository}"
          done <<< "${REPOSITORIES}"

      - name: Build release
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_centralUsername: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          ORG_GRADLE_PROJECT_centralPassword: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
        run: |
          ./gradlew \
            -PsmartDomainVersion=${{ steps.version.outputs.value }} \
            build
          ./gradlew \
            --no-parallel \
            -PsmartDomainVersion=${{ steps.version.outputs.value }} \
            publishReleaseToCentral

      - name: Notify Central Portal
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
        run: |
          AUTH=$(printf '%s:%s' "${CENTRAL_TOKEN_USERNAME}" "${CENTRAL_TOKEN_PASSWORD}" | base64 | tr -d '\n')
          curl --fail \
            --request POST \
            --header "Authorization: Bearer ${AUTH}" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/io.github.jayclock?publishing_type=automatic"
