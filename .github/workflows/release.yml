name: Smart Domain Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.0
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  CI: true
  TZ: UTC
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build release
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_centralUsername: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          ORG_GRADLE_PROJECT_centralPassword: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
        run: |
          ./gradlew \
            -PsmartDomainVersion=${{ steps.version.outputs.value }} \
            build
          ./gradlew \
            --no-parallel \
            -PsmartDomainVersion=${{ steps.version.outputs.value }} \
            publishReleaseBundle

      - name: Upload release bundle
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          AUTH=$(printf '%s:%s' "${CENTRAL_TOKEN_USERNAME}" "${CENTRAL_TOKEN_PASSWORD}" | base64 | tr -d '\n')
          BUNDLE_ROOT="${GITHUB_WORKSPACE}/build/central-bundle/repository"
          BUNDLE_FILE="${GITHUB_WORKSPACE}/build/central-bundle/central-bundle-${VERSION}.zip"

          find "${BUNDLE_ROOT}" -type f \( \
            -name 'maven-metadata.xml*' -o \
            -name '*.module*' \
          \) -delete

          while IFS= read -r -d '' file; do
            md5sum "${file}" | awk '{print $1}' > "${file}.md5"
            sha1sum "${file}" | awk '{print $1}' > "${file}.sha1"
            sha256sum "${file}" | awk '{print $1}' > "${file}.sha256"
            sha512sum "${file}" | awk '{print $1}' > "${file}.sha512"
          done < <(find "${BUNDLE_ROOT}" -type f ! -name '*.md5' ! -name '*.sha1' ! -name '*.sha256' ! -name '*.sha512' -print0)

          rm -f "${BUNDLE_FILE}"
          (
            cd "${BUNDLE_ROOT}"
            zip -r "${BUNDLE_FILE}" .
          )

          DEPLOYMENT_ID=$(curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${AUTH}" \
            --form "bundle=@${BUNDLE_FILE}" \
            "https://central.sonatype.com/api/v1/publisher/upload?name=smart-domain-${VERSION}&publishingType=AUTOMATIC")

          echo "Deployment ID: ${DEPLOYMENT_ID}"

          LAST_STATUS_JSON=''

          for attempt in $(seq 1 120); do
            STATUS_JSON=$(curl --fail --silent --show-error \
              --request POST \
              --header "Authorization: Bearer ${AUTH}" \
              "https://central.sonatype.com/api/v1/publisher/status?id=${DEPLOYMENT_ID}")
            LAST_STATUS_JSON="${STATUS_JSON}"
            STATE=$(printf '%s' "${STATUS_JSON}" | python3 -c 'import json, sys; print(json.load(sys.stdin)["deploymentState"])')
            echo "Attempt ${attempt}: deployment state is ${STATE}"

            if [ "${STATE}" = "PUBLISHED" ]; then
              exit 0
            fi

            if [ "${STATE}" = "FAILED" ]; then
              echo "${STATUS_JSON}"
              exit 1
            fi

            sleep 15
          done

          echo "Timed out waiting for Central deployment to publish."
          if [ -n "${LAST_STATUS_JSON}" ]; then
            echo "${LAST_STATUS_JSON}"
          fi
          exit 1
