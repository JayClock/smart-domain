name: Smart Domain CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  CI: true
  TZ: UTC
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Consumer sample
        run: ./gradlew -p samples/consumer test

      - name: API consumer sample
        run: ./gradlew -p samples/api-consumer test
